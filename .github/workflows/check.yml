name: Code-Check

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Dependencies installieren
        run: npm install --no-audit --no-fund

      - name: Prettier-Format-Check
        run: npm run format:check

      - name: ESLint
        run: npm run lint

      - name: Syntax-Check JS-Dateien
        run: |
          set -e
          for f in $(git ls-files '*.js'); do
            echo "→ $f"
            node --check "$f"
          done

      - name: Duplikate Methodendefinitionen
        run: |
          dups=$(grep -nE "^[a-zA-Z_]+\s*\([^)]*\)\s*\{" anazhRealm.js \
            | sed -E 's/^[0-9]+://; s/\(.*//' \
            | sort | uniq -d || true)
          if [ -n "$dups" ]; then
            echo "❌ Doppelte Methodendefinitionen gefunden:"
            echo "$dups"
            exit 1
          fi
          echo "✅ Keine Duplikate"

      - name: Stale-Source-Probe-Linse (Refactor-Drift in den Gate-Proben — die c1c1271-Klasse)
        run: npm run gate:source-probes

      - name: Single-Quote-Template-Strings (B2-Pattern)
        run: |
          # Erkennt Funktionsaufrufe wie foo('… ${x} …') – ${...} in einfach-quotierten
          # String-Argumenten interpoliert nicht. Backticks innerhalb von Bezeichnern
          # werden bewusst nicht gematcht (auch wenn sie Apostrophe enthalten).
          if grep -nE "\(\s*'[^']*\\\$\{[^}]+\}[^']*'\s*[,)]" anazhRealm.js; then
            echo "❌ Single-Quote-Template-String erkannt – Backticks verwenden"
            exit 1
          fi
          echo "✅ Keine fehlgeschlagenen Template-Strings"

      - name: Ammo-Memory-Leak-Indikator
        continue-on-error: true
        run: |
          alloc=$(grep -c 'new Ammo.btVector3' anazhRealm.js || echo 0)
          freed=$(grep -c 'Ammo.destroy' anazhRealm.js || echo 0)
          echo "btVector3-Allokationen: $alloc"
          echo "Ammo.destroy-Aufrufe:   $freed"
          if [ "$alloc" -gt $((freed * 4)) ]; then
            echo "⚠️ Verdacht auf Memory-Leak: deutlich mehr Allokationen als Frees"
          fi

      - name: Verbotenes dynamisches Auswerten (eval / new Function)
        # Ring 2 Phase 5: die DSL ist der einzige Pfad für dynamische
        # Effekte. Wenn dieser Grep wieder fündig wird, schaltet jemand
        # das Sicherheits-Modell aus.
        run: |
          if grep -nE "(eval\(|new Function\()" anazhRealm.js save-server.js; then
            echo "❌ Dynamisches Code-Eval gefunden — DSL nutzen, nicht eval/new Function"
            exit 1
          fi
          echo "✅ Kein dynamisches Code-Eval"

      - name: innerHTML-Schreibzugriffe (Hinweis, kein Fail)
        continue-on-error: true
        run: |
          grep -nE "innerHTML\s*\+?=" anazhRealm.js || echo "keine Treffer"

      - name: TODO/FIXME-Übersicht (Hinweis, kein Fail)
        continue-on-error: true
        run: |
          grep -nE "(TODO|FIXME|XXX|HACK|TBD)" anazhRealm.js save-server.js || echo "keine TODOs"

  playtest:
    # PER-PUSH-MERGE-GATE — der RELIABLE, schnelle Tier: der Fast-Playtest (Kern-Gesundheit,
    # ~13 Checks: Crash · Welt/Terrain · Avatar-Rig · Kreatur · Bauplan · Resonanz · Stats) +
    # die GPU-Churn-Linse. Beide laufen in Minuten + schliessen zuverlässig ab.
    # WARUM NICHT DER VOLLE PLAYTEST HIER: die ~5340 Invarianten über 242 Bänder sind für einen
    # geteilten CI-Runner zu schwer — sie brauchen STUNDEN (gemessen: 3,5 h dann Fehlschlag, sogar
    # bei einem reinen Docs-Commit → ein Infrastruktur-Hang, kein Code-Bug). Death-by-tausend-
    # langsamen-Bändern, nicht ein einzelner Hänger (ein hängender page.evaluate würde vom
    # protocolTimeout=240s gefangen). Die volle Deckung lebt jetzt in `playtest-full.yml`
    # (manuell + nächtlich, timeout-bounded), wo Stunden in Ordnung sind. Der Fast-Tier fängt
    # ~80 % der Regressionen SOFORT (CLAUDE.md: „Nicht jede Änderung durch den 10-min-Gate zwingen").
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: System-Libs für headless Chromium
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2t64 || \
          sudo apt-get install -y --no-install-recommends \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 libdrm2 \
            libxkbcommon0 libxcomposite1 libxdamage1 libxfixes3 libxrandr2 \
            libgbm1 libpango-1.0-0 libcairo2 libasound2

      - name: Dependencies installieren (inkl. puppeteer)
        run: npm install --no-audit --no-fund

      - name: Page-Error-Wächter (Runtime-Wurzel — die V17.20-Klasse fail-fast)
        # Bootet die Seite GPU-frei + sammelt jeden Runtime-Throw / echten Console-Error und
        # exitet non-zero an der WURZEL (mit Stack) — BEVOR der Playtest in Folge-Fehlern
        # ertrinkt. Fängt einen `is not a function`-Boot-Tod (ein verrutschter Methoden-Schnitt),
        # den `node --check` nicht sieht (Syntax bleibt valide). Die Schwester zu cut-method.cjs.
        run: npm run gate:page-error

      - name: Persistenz-Härtung (rotierender Backup + korruptions-sicherer Load)
        # Beweist headless, dass ein korrupter/partieller localStorage-Write die Welt NICHT mehr
        # vernichtet: saveState rotiert einen .bak-Backup, der Load fällt bei korruptem Haupt-
        # Stand darauf zurück (beide korrupt → ehrliches null). Schliesst den Datenverlust-Riss.
        run: npm run gate:persistence

      - name: Adaptiver Carve-Rebuild (der Grab-Stall an der Wurzel)
        # Beweist headless die adaptive Sync/Async-Entscheidung des Edit-/Spieler-Chunk-Rebuilds:
        # gesunder Frame → SYNC (instant-Carve-Feedback auf starker HW), Frame über Budget →
        # ASYNC (KEIN ~200-ms-Stall auf schwacher HW; Kollision feld-nativ = sofort), explizites
        # forceSync gewinnt immer. Schliesst den Schöpfer-`Gegraben → FPS 4`-Befund an der Wurzel.
        run: npm run gate:carve

      - name: Gras-Nach-Dünnen (die dominante Last folgt dem EINEN Regler im Stand)
        # Beweist headless, dass das Gras (die dominante kapazitäts-geregelte Last, V18.307) dem
        # `_foliageDensityScale`-Regler NICHT nur beim Erst-Bau folgt, sondern auch im Stand/Drehen:
        # gesunkene Dichte → die GELADENE Gras-Last sinkt (−60% bei 0.4); Default-Dichte (scale=1) →
        # KEIN Dünnen (volle Wiese, gate-treu); über Budget → kein Dünnen (V18.282). Die V18.280-Hälfte
        # für Gras — adaptiv, nicht geschnitten (starke HW behält die volle Wiese).
        run: npm run gate:grass-thin

      - name: Schnell-Playtest (Kern-Gesundheit, ~13 Checks)
        # Bootet die Welt render-gestubbt + kurzer Plateau-Warmup + die Kern-Gesundheits-Checks
        # (Crash · Welt/Terrain baut · Avatar-Rig/Kreatur/Bauplan baut · Resonanz-Rollen · Stats).
        # Schliesst zuverlässig in Minuten ab — der reliable per-Push-Gate. Der volle Playtest
        # läuft in playtest-full.yml.
        run: npm run playtest:fast

      - name: GPU-Churn-Linse (echter Renderer — die Klasse hinter dem V18.322-Idle-Freeze)
        # Die STEHENDE Linse gegen „eine pro-Frame/periodisch neu kompilierte GPU-Pipeline im
        # Steady-State" (scene.environment-Identitäts-Churn → Recompile-Cascade = der Idle-Freeze,
        # der 50+ Versionen überlebte). Der Null-Renderer-Playtest oben ist dafür STRUKTURELL
        # blind (er stubt den GPU-Pfad); diese Linse fährt den ECHTEN Renderer (swiftshader) und
        # zählt createRenderPipeline/linkProgram. Nach Warmup MUSS eine Env-Regenerierung 0
        # Pipelines neu kompilieren — sonst exit≠0 und der Build wird ROT, bevor jemand friert.
        run: npm run gpu-lens

      - name: Look-Physik-Linse (der Look gegen die gemessene Realität)
        # Die LINSE gegen den asymmetrischen-Verifikations-Riss: das Gate misst Mechanik, nicht
        # den Perzept — ABER für die Teile des Looks, die REALITÄT SIND (Albedo · Wetter-Dimmung ·
        # Atmosphäre-Trägheit · HDR-Tone-Mapping · lineare Farbe), gibt es eine publizierte
        # physikalische Wahrheit. Diese Linse assertiert die CPU-lesbaren Look-Konstanten gegen
        # reale Bereiche — GPU-frei, kein Schöpfer-Auge, eine ZAHL gegen die Realität.
        run: npm run look-lens

      - name: Look-Golden-Linse (Selbst-Test der perzeptuellen MSSIM-Metrik)
        # Beweist die perzeptuelle Linse SELBST (MSSIM: identisch→1 · degradiert→<1), GPU-frei.
        # Der gerenderte Golden-Vergleich (--render/--mint) gehört auf echte GPU + einen
        # Schöpfer-Sign-off — hier läuft nur der gate-taugliche Linsen-Selbst-Test.
        run: npm run look-golden
