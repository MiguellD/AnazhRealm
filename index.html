<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <!--
      Ring 2 Phase 6 — CSP. Lockerer als „voll strict", aber ehrlich. Drei
      bewusste Konzessionen:

        1. 'unsafe-eval' im script-src: TensorFlow.js (vendor/tf.min.js)
           kompiliert WebGL-Shader-Kernel zur Laufzeit per eval. Ohne diese
           Erlaubnis schlägt initAI fehl. Phase 7 könnte TF durch eval-freies
           brain.js ersetzen — bis dahin steht hier die Konzession. UNSER
           eigener Code nutzt kein eval; das CI-Gate „Verbotenes dynamisches
           Auswerten" schützt diesen Pfad hart.
        2. 'wasm-unsafe-eval' im script-src: für Ammo.js (WebAssembly).
        3. 'unsafe-inline' im style-src: Three.js setzt inline-Styles aufs
           <canvas> für Größe + Position. Risiko gering, weil kein User-
           kontrolliertes CSS injizierbar ist.

      object-src 'none' und base-uri 'self' bleiben strict. frame-ancestors
      gehört in den HTTP-Header (via <meta> ignoriert der Browser es) — der
      lokale save-server kann das künftig liefern.
    -->
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'wasm-unsafe-eval' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://127.0.0.1:4312 http://localhost:4312; img-src 'self' data: blob:; font-src 'self'; worker-src 'self' blob:; object-src 'none'; base-uri 'self';">
    <title>Anazh Realm v7.65 – Das Ultiversum</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            color: #fff;
            font-family: Arial, sans-serif;
        }
        #world-canvas {
            position: absolute;
            top: 0;
            left: 0;
        }
        #log {
            position: absolute;
            bottom: 10px;
            left: 10px;
            width: 400px;
            height: 200px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            overflow-y: auto;
            padding: 10px;
            font-size: 12px;
            border: 1px solid #555;
        }
        #fps {
            position: absolute;
            top: 10px;
            left: 10px;
            color: #fff;
            font-size: 16px;
            background-color: rgba(0, 0, 0, 0.8);
            padding: 5px;
            border: 1px solid #555;
        }
        #chat {
            position: absolute;
            top: 50px;
            left: 10px;
            width: 400px;
            background-color: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 10px;
            border: 1px solid #555;
        }
        #chat-output {
            max-height: 100px;
            overflow-y: auto;
            margin-bottom: 10px;
            font-size: 12px;
        }
        #chat-input {
            width: 100%;
            background-color: #333;
            color: #fff;
            border: 1px solid #555;
            padding: 5px;
            font-size: 12px;
        }
        #dialogue-box {
            position: absolute;
            top: 24px;
            left: 50%;
            transform: translateX(-50%);
            max-width: 60%;
            padding: 10px 18px;
            background-color: rgba(20, 20, 30, 0.78);
            color: #f4f1e8;
            border: 1px solid rgba(255, 255, 255, 0.18);
            border-radius: 6px;
            font-size: 15px;
            font-style: italic;
            line-height: 1.4;
            text-align: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 600ms ease-in-out;
            z-index: 5;
        }
        #dialogue-box.visible { opacity: 1; }
        #grok-voice-toggle {
            position: absolute;
            top: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ddd;
            border: 1px solid #555;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 6;
        }
        #grok-voice-toggle[aria-pressed="true"] { color: #fff; border-color: #aaa; }
        #grok-voice-toggle[hidden] { display: none; }
        #anazh-symphony-toggle {
            position: absolute;
            top: 40px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ddd;
            border: 1px solid #555;
            padding: 4px 8px;
            font-size: 12px;
            cursor: pointer;
            z-index: 6;
        }
        #anazh-symphony-toggle[aria-pressed="true"] { color: #fff; border-color: #aaa; }
        #state-file-input { display: none; }
        /* Ring 4.5 — Status-Panel V1: lesbares Fenster auf Welt + Emotionen.
           Rechts unter den Toggles, kompakt, kein Re-Layout pro Frame. */
        #status-panel {
            position: absolute;
            top: 80px;
            right: 10px;
            width: 240px;
            max-height: 75vh;
            overflow-y: auto;
            background-color: rgba(0, 0, 0, 0.78);
            color: #ddd;
            border: 1px solid #555;
            border-radius: 4px;
            padding: 10px;
            font-size: 12px;
            z-index: 5;
        }
        #status-panel .section { margin-bottom: 14px; }
        #status-panel .section:last-child { margin-bottom: 0; }
        #status-panel h3 {
            font-size: 10px;
            margin: 0 0 6px 0;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 600;
        }
        #status-panel .row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3px;
        }
        #status-panel .row .label { color: #888; font-size: 11px; }
        #status-panel .row .value { color: #ddd; font-size: 11px; font-family: monospace; }
        #status-panel .emotion {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 4px;
        }
        #status-panel .emotion .name {
            width: 60px;
            font-size: 10px;
            color: #aaa;
            text-transform: capitalize;
        }
        #status-panel .emotion .bar {
            flex: 1;
            height: 7px;
            background: rgba(255, 255, 255, 0.08);
            border-radius: 2px;
            overflow: hidden;
        }
        #status-panel .emotion .bar > div {
            height: 100%;
            width: 0%;
            transition: width 250ms ease-out;
        }
        #status-panel .emotion .value {
            width: 28px;
            text-align: right;
            font-size: 10px;
            color: #888;
            font-family: monospace;
        }
        #status-panel .emotion.joy    .bar > div { background: #f7d358; }
        #status-panel .emotion.awe    .bar > div { background: #d4a3ff; }
        #status-panel .emotion.sorrow .bar > div { background: #5ec0eb; }
        #status-panel .emotion.hope   .bar > div { background: #7bd389; }
        #status-panel .emotion.peace  .bar > div { background: #88e1e1; }
        #status-panel .emotion.chaos  .bar > div { background: #e94c89; }
        #status-panel .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 4px;
        }
        #status-panel .actions button {
            background: rgba(255, 255, 255, 0.06);
            color: #ddd;
            border: 1px solid #555;
            padding: 5px 6px;
            font-size: 11px;
            font-family: inherit;
            cursor: pointer;
            border-radius: 3px;
            text-align: center;
        }
        #status-panel .actions button:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #888;
        }
        #status-panel .ability-row {
            display: flex;
            align-items: center;
            gap: 6px;
            margin-bottom: 3px;
            padding: 4px 6px;
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid #333;
            border-radius: 2px;
            font-size: 11px;
        }
        #status-panel .ability-row .name {
            flex: 1;
            font-family: monospace;
            color: #ddd;
        }
        #status-panel .ability-row .source {
            font-size: 9px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        #status-panel .ability-row.source-human .source { color: #7bd389; }
        #status-panel .ability-row.source-nexus .source { color: #d4a3ff; }
        #status-panel .ability-row.source-restored .source { color: #f7d358; }
        #status-panel .ability-row button {
            background: rgba(255, 255, 255, 0.08);
            color: #ddd;
            border: 1px solid #555;
            padding: 2px 8px;
            font-size: 10px;
            cursor: pointer;
            border-radius: 2px;
            font-family: inherit;
        }
        #status-panel .ability-row button:hover {
            background: rgba(255, 255, 255, 0.18);
            border-color: #aaa;
        }
        #status-panel .ability-empty {
            font-size: 11px;
            color: #666;
            font-style: italic;
        }
        #status-panel .tuning-row {
            margin-bottom: 8px;
        }
        #status-panel .tuning-row label {
            display: flex;
            justify-content: space-between;
            font-size: 10px;
            color: #888;
            margin-bottom: 2px;
        }
        #status-panel .tuning-row label .v {
            font-family: monospace;
            color: #ddd;
        }
        #status-panel .tuning-row input[type="range"] {
            width: 100%;
            accent-color: #88e1e1;
        }
        #help-toggle {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background-color: rgba(0, 0, 0, 0.6);
            color: #ddd;
            border: 1px solid #555;
            padding: 4px 10px;
            font-size: 12px;
            cursor: pointer;
            z-index: 6;
            border-radius: 3px;
        }
        #help-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(0, 0, 0, 0.85);
            color: #ddd;
            z-index: 100;
            padding: 40px;
            font-size: 13px;
            overflow-y: auto;
        }
        #help-overlay[hidden] { display: none; }
        #help-overlay h2 {
            margin: 0 0 16px 0;
            font-size: 16px;
            color: #fff;
        }
        #help-overlay h3 {
            margin: 16px 0 6px 0;
            font-size: 12px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        #help-overlay .cmd {
            display: block;
            text-align: left;
            background: rgba(255, 255, 255, 0.05);
            color: #ddd;
            border: 1px solid #444;
            padding: 6px 10px;
            margin-bottom: 3px;
            font-family: monospace;
            font-size: 12px;
            cursor: pointer;
            border-radius: 2px;
            width: 100%;
            max-width: 480px;
        }
        #help-overlay .cmd:hover {
            background: rgba(255, 255, 255, 0.12);
            border-color: #888;
        }
        #help-overlay .close {
            position: absolute;
            top: 14px;
            right: 14px;
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid #555;
            color: #ddd;
            font-size: 16px;
            padding: 2px 10px;
            cursor: pointer;
            border-radius: 2px;
        }
    </style>
</head>
<body>
    <canvas id="world-canvas"></canvas>
    <div id="fps"></div>
    <div id="dialogue-box" aria-live="polite"></div>
    <button id="grok-voice-toggle" type="button" aria-pressed="false" hidden>Stimme: aus</button>
    <button id="anazh-symphony-toggle" type="button" aria-pressed="false">Klang: aus</button>
    <aside id="status-panel" aria-label="Welt-Status">
        <section class="section">
            <h3>Welt</h3>
            <div class="row"><span class="label">Wetter</span><span class="value" id="status-weather">—</span></div>
            <div class="row"><span class="label">Slug</span><span class="value" id="status-slug">—</span></div>
            <div class="row"><span class="label">Position</span><span class="value" id="status-position">—</span></div>
            <div class="row"><span class="label">FPS</span><span class="value" id="status-fps">—</span></div>
            <div class="row"><span class="label">Kreaturen</span><span class="value" id="status-creatures">—</span></div>
        </section>
        <section class="section">
            <h3>Emotionen</h3>
            <div id="status-emotions"></div>
        </section>
        <section class="section">
            <h3>Quick</h3>
            <div class="actions" id="quick-actions">
                <button type="button" data-cmd="Heile Welt">Heile Welt</button>
                <button type="button" data-cmd="Vereine Chaos Ordnung">Harmonie</button>
                <button type="button" data-cmd="Setze Wetter sunny">Sonne</button>
                <button type="button" data-cmd="Setze Wetter rainy">Regen</button>
                <button type="button" data-cmd="Spawne Kreaturen 5">+5 Kreaturen</button>
                <button type="button" data-cmd="Spawne neue Welt">Neue Welt</button>
                <button type="button" data-cmd="Boden aktivieren">Boden an</button>
                <button type="button" data-cmd="Boden deaktivieren">Boden aus</button>
            </div>
        </section>
        <section class="section">
            <h3>Fähigkeiten</h3>
            <div id="status-abilities"></div>
        </section>
        <section class="section">
            <h3>Speicher</h3>
            <div class="actions" id="save-actions">
                <button type="button" data-cmd="Speichere Zustand">Speichern</button>
                <button type="button" data-cmd="Lade Zustand">Laden</button>
                <button type="button" data-cmd="Lade Datei">Datei…</button>
                <button type="button" id="action-export-state">Export…</button>
            </div>
        </section>
        <section class="section">
            <h3>Tuning (Emotionen)</h3>
            <div class="tuning-row">
                <label for="tune-threshold">
                    <span>Schwelle</span><span class="v" id="tune-threshold-v">0.70</span>
                </label>
                <input type="range" id="tune-threshold" min="0.3" max="1.0" step="0.05" value="0.7">
            </div>
            <div class="tuning-row">
                <label for="tune-decay">
                    <span>Decay/s</span><span class="v" id="tune-decay-v">0.005</span>
                </label>
                <input type="range" id="tune-decay" min="0.001" max="0.05" step="0.001" value="0.005">
            </div>
            <div class="tuning-row">
                <label for="tune-cooldown">
                    <span>Cooldown (s)</span><span class="v" id="tune-cooldown-v">30</span>
                </label>
                <input type="range" id="tune-cooldown" min="5" max="120" step="5" value="30">
            </div>
        </section>
    </aside>
    <button id="help-toggle" type="button" aria-label="Hilfe">? Befehle</button>
    <div id="help-overlay" hidden aria-modal="true" role="dialog" aria-labelledby="help-title">
        <button type="button" class="close" id="help-close" aria-label="Schließen">×</button>
        <h2 id="help-title">Alle Chat-Befehle</h2>
        <p style="color: #888; margin-bottom: 16px;">Klick auf einen Befehl, um ihn auszuführen.</p>
        <div id="help-list"></div>
    </div>
    <div id="chat">
        <div id="chat-output"></div>
        <input type="text" id="chat-input" placeholder="Befehl eingeben (z. B. 'Ändere Wetter zu Regen')">
    </div>
    <div id="log"></div>
    <!-- Versteckter File-Picker für 'Lade Datei'-Chat-Befehl. -->
    <input type="file" id="state-file-input" accept="application/json,.json">
    <!-- Vendored libs (vendor/README.md erklärt Versionen + Update-Befehl) -->
    <script src="vendor/three.min.js"></script>
    <script src="vendor/ammo.js"></script>
    <script src="vendor/tf.min.js"></script>
    <script src="vendor/simplex-noise.js"></script>
    <!-- Phase 6: kein Inline-Bootstrap mehr — direkte Skript-Einbindung, defer
         garantiert die Reihenfolge nach den Vendor-Libs und das Warten auf
         DOMContentLoaded ohne Inline-Listener. -->
    <script src="anazhRealm.js" defer></script>
</body>
</html>
